<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrewPay Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#fdf6ee;--brown:#3b2314;--espresso:#1e0f07;--tan:#c8a882;--accent:#d4622a;--card:#fff9f2;--border:#e8d9c8;--green:#6dba7f}
body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--brown);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px 60px}
header{text-align:center;margin-bottom:32px}
h1{font-family:'DM Serif Display',serif;font-size:1.8rem;color:var(--espresso)}
.tagline{color:var(--tan);font-size:.9rem;margin-top:6px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:480px;margin-bottom:20px}
.card-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tan);margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:.85rem;font-weight:600;margin-bottom:5px;color:var(--brown)}
.field input{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:11px 13px;font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--brown);background:none;outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--tan)}
.member{background:var(--cream);border:1.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;position:relative}
.member-name-label{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--espresso);margin-bottom:10px;font-weight:600}
.remove-btn{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--tan);font-size:1.1rem;cursor:pointer;padding:2px 6px;border-radius:4px}
.remove-btn:hover{color:#c0392b}
.days-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.day-btn{background:none;border:1.5px solid var(--border);border-radius:6px;padding:5px 9px;font-size:.78rem;font-weight:600;cursor:pointer;color:var(--tan);transition:all .15s;font-family:'DM Sans',sans-serif}
.day-btn.active{background:var(--accent);border-color:var(--accent);color:white}
.time-row{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:.85rem;flex-wrap:wrap}
.time-row label{color:var(--brown);font-weight:600;min-width:90px}
.time-row input[type=time]{border:1.5px solid var(--border);border-radius:7px;padding:6px 10px;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--brown);background:none;outline:none}
.time-row input[type=time]:focus{border-color:var(--accent)}
.add-btn{width:100%;background:none;border:2px dashed var(--border);border-radius:12px;padding:13px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;color:var(--tan);cursor:pointer;transition:all .15s;margin-bottom:4px}
.add-btn:hover{border-color:var(--accent);color:var(--accent)}
.save-btn{display:block;width:100%;max-width:480px;background:var(--accent);color:white;border:none;border-radius:14px;padding:17px;font-family:'DM Serif Display',serif;font-size:1.2rem;cursor:pointer;text-align:center;transition:background .15s,transform .1s;margin-bottom:12px}
.save-btn:hover{background:#bf551f;transform:translateY(-1px)}
.save-btn:disabled{background:var(--border);color:var(--tan);cursor:not-allowed;transform:none}
.preview-btn{display:block;width:100%;max-width:480px;background:var(--espresso);color:white;border:none;border-radius:14px;padding:17px;font-family:'DM Serif Display',serif;font-size:1.2rem;cursor:pointer;text-align:center;transition:background .15s}
.preview-btn:hover{background:#2d1a0e}
.toast{display:none;position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--green);color:white;padding:12px 24px;border-radius:10px;font-weight:600;font-size:.95rem;z-index:999;white-space:nowrap}
.toast.show{display:block}
.toast.error{background:#e74c3c}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:100%;max-width:380px;text-align:center}
.login-card h2{font-family:'DM Serif Display',serif;font-size:1.6rem;color:var(--espresso);margin-bottom:20px}
.login-btn{width:100%;background:var(--accent);color:white;border:none;border-radius:12px;padding:14px;font-family:'DM Serif Display',serif;font-size:1.1rem;cursor:pointer;margin-top:8px}
.status{font-size:.8rem;color:var(--tan);text-align:center;margin-top:8px}
</style>
</head>
<body>

<div id="loginView" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;width:100%">
  <div class="login-card">
    <span style="font-size:2.4rem;display:block;margin-bottom:12px">&#9749;</span>
    <h2>Admin Login</h2>
    <div class="field">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">Log In</button>
    <div class="status" id="loginStatus"></div>
  </div>
</div>

<div id="adminView" style="display:none;flex-direction:column;align-items:center;width:100%">
  <header>
    <span style="font-size:2rem;display:block;margin-bottom:6px">&#9749;</span>
    <h1>CrewPay Admin</h1>
    <p class="tagline">Edit your crew and go live instantly</p>
  </header>

  <div class="card">
    <div class="card-label">Business Name</div>
    <div class="field">
      <input type="text" id="bizName" placeholder="e.g. Aristocrat Cafe">
    </div>
  </div>

  <div class="card">
    <div class="card-label">Your Crew</div>
    <div id="memberList"></div>
    <button class="add-btn" onclick="addMember()">+ Add Crew Member</button>
  </div>

  <button class="save-btn" id="saveBtn" onclick="saveConfig()">Save Changes — Go Live Now</button>
  <button class="preview-btn" onclick="window.open('index.html','_blank')">Preview Tip Page</button>
</div>

<div class="toast" id="toast"></div>

<script>
var SUPABASE_URL = "https://sbtxybejjgnapaqjuhud.supabase.co";
var SUPABASE_KEY = "sb_publishable_JjaYcs-qv69RJrL8GQ2JBA_3ORNBwvj";
var ADMIN_PASSWORD = "aristocrat2024";
var members = [];
var days = ["Su","Mo","Tu","We","Th","Fr","Sa"];

function doLogin() {
  var pw = document.getElementById("passwordInput").value;
  if (pw === ADMIN_PASSWORD) {
    document.getElementById("loginView").style.display = "none";
    document.getElementById("adminView").style.display = "flex";
    loadConfig();
  } else {
    document.getElementById("loginStatus").textContent = "Incorrect password.";
    document.getElementById("loginStatus").style.color = "#e74c3c";
  }
}

async function loadConfig() {
  try {
    var res = await fetch(SUPABASE_URL + "/rest/v1/crewpay_config?select=*&order=id.asc", {
      headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
    });
    var data = await res.json();
    if (data && data.length > 0) {
      var config = data[0];
      document.getElementById("bizName").value = config.biz_name || "";
      members = config.members || [];
    }
  } catch(e) {
    members = [];
  }
  renderMembers();
}

function addMember(data) {
  members.push(data || {name:"",venmo:"",cashapp:"",zelle:"",days:[1,2,3,4,5],startTime:"",endTime:""});
  renderMembers();
}

function renderMembers() {
  var list = document.getElementById("memberList");
  list.innerHTML = "";
  members.forEach(function(m, idx) {
    var div = document.createElement("div");
    div.className = "member";

    var rmBtn = document.createElement("button");
    rmBtn.className = "remove-btn";
    rmBtn.innerHTML = "&#x2715;";
    (function(i){ rmBtn.onclick = function(){ members.splice(i,1); renderMembers(); }; })(idx);
    div.appendChild(rmBtn);

    var nameLabel = document.createElement("div");
    nameLabel.className = "member-name-label";
    nameLabel.textContent = m.name || "New Member";
    div.appendChild(nameLabel);

    var fieldDefs = [
      {label:"Name", key:"name", type:"text", ph:"e.g. Julian"},
      {label:"Venmo Username", key:"venmo", type:"text", ph:"e.g. Julian-morales-147"},
      {label:"Cash App $Cashtag", key:"cashapp", type:"text", ph:"e.g. julianmorales42"},
      {label:"Zelle Phone", key:"zelle", type:"tel", ph:"e.g. 7028830668"}
    ];
    fieldDefs.forEach(function(fd) {
      var fw = document.createElement("div"); fw.className = "field";
      var lbl = document.createElement("label"); lbl.textContent = fd.label;
      var inp = document.createElement("input");
      inp.type = fd.type; inp.placeholder = fd.ph; inp.value = m[fd.key] || "";
      (function(i,k,nl){ inp.oninput = function(){
        members[i][k] = this.value;
        if(k==="name") nl.textContent = this.value || "New Member";
      }; })(idx, fd.key, nameLabel);
      fw.appendChild(lbl); fw.appendChild(inp); div.appendChild(fw);
    });

    var dlbl = document.createElement("div");
    dlbl.className = "card-label";
    dlbl.style.cssText = "margin-top:10px;margin-bottom:6px";
    dlbl.textContent = "Working Days";
    div.appendChild(dlbl);

    var drow = document.createElement("div"); drow.className = "days-row";
    days.forEach(function(d, di) {
      var btn = document.createElement("button");
      btn.className = "day-btn" + (m.days.indexOf(di) >= 0 ? " active" : "");
      btn.textContent = d;
      (function(i, dayIdx){ btn.onclick = function(){
        var pos = members[i].days.indexOf(dayIdx);
        if (pos >= 0) members[i].days.splice(pos,1);
        else members[i].days.push(dayIdx);
        renderMembers();
      }; })(idx, di);
      drow.appendChild(btn);
    });
    div.appendChild(drow);

    var timeFields = [{label:"Shift starts:", key:"startTime"},{label:"Shift ends:", key:"endTime"}];
    timeFields.forEach(function(tf) {
      var tr = document.createElement("div"); tr.className = "time-row";
      var tl = document.createElement("label"); tl.textContent = tf.label;
      var ti = document.createElement("input"); ti.type = "time"; ti.value = m[tf.key] || "";
      (function(i,k){ ti.oninput = function(){ members[i][k] = this.value; }; })(idx, tf.key);
      var ts = document.createElement("span"); ts.style.cssText = "color:var(--tan);font-size:.8rem"; ts.textContent = "(optional)";
      tr.appendChild(tl); tr.appendChild(ti); tr.appendChild(ts);
      div.appendChild(tr);
    });

    list.appendChild(div);
  });
}

async function saveConfig() {
  var btn = document.getElementById("saveBtn");
  var bizName = document.getElementById("bizName").value.trim();
  if (!bizName) { showToast("Please enter a business name.", true); return; }
  if (members.length === 0) { showToast("Please add at least one crew member.", true); return; }

  btn.disabled = true;
  btn.textContent = "Saving...";

  var payload = { biz_name: bizName, members: members };

  try {
    // Check if row exists
    var check = await fetch(SUPABASE_URL + "/rest/v1/crewpay_config?select=id", {
      headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
    });
    var existing = await check.json();

    var method, url;
    if (existing && existing.length > 0) {
      method = "PATCH";
      url = SUPABASE_URL + "/rest/v1/crewpay_config?id=eq." + existing[0].id;
    } else {
      method = "POST";
      url = SUPABASE_URL + "/rest/v1/crewpay_config";
    }

    var res = await fetch(url, {
      method: method,
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": "return=minimal"
      },
      body: JSON.stringify(payload)
    });

    if (res.ok || res.status === 204) {
      showToast("Saved! Tip page is now live.");
    } else {
      var err = await res.text();
      showToast("Error: " + err, true);
    }
  } catch(e) {
    showToast("Save failed: " + e.message, true);
  }

  btn.disabled = false;
  btn.textContent = "Save Changes — Go Live Now";
}

function showToast(msg, isError) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (isError ? " error" : "");
  setTimeout(function(){ t.className = "toast"; }, 3000);
}
</script>
</body>
</html>
